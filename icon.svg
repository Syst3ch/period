<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4f9b"/>
      <stop offset="100%" stop-color="#ffb3d9"/>
    </linearGradient>

    <radialGradient id="shine" cx="30%" cy="20%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- רקע -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- ברק עליון -->
  <rect width="512" height="512" rx="120" fill="url(#shine)"/>

  <!-- עיגול מרכזי -->
  <circle cx="256" cy="256" r="110" fill="white" opacity="0.95"/>

  <!-- נקודה קטנה (סטייל ביוץ) -->
  <circle cx="256" cy="256" r="18" fill="#ff4f9b"/>

  <!-- צל עדין -->
  <ellipse cx="256" cy="390" rx="120" ry="25" fill="black" opacity="0.08"/>
</svg>
