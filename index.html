<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perioday - ניהול חכם ומאובטח</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #ffd6e8, #fff6fa);
            color: #351126;
            min-height: 100vh;
        }
        .app, .login-screen, .setup-screen { max-width: 500px; margin: auto; padding: 20px; width: 100%; }
        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(190, 70, 120, .1); }
        .title { font-size: 18px; font-weight: bold; margin-bottom: 12px; color: #ff4f9b; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        
        input, select, textarea, .main-btn { width: 100%; padding: 14px; border-radius: 18px; border: 1.5px solid #f3aacb; margin-top: 8px; font-size: 16px; outline: none; }
        .main-btn { background: linear-gradient(135deg, #ff4f9b, #ff91c2); color: white; border: 0; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .secondary-btn { background: #f3f3f3; color: #86526b; border: 0; padding: 12px; border-radius: 15px; font-size: 14px; cursor: pointer; width: 100%; margin-top: 10px; }
        .logout-btn { background: white; color: #86526b; border: 1.5px solid #f3aacb; padding: 8px 12px; border-radius: 12px; font-size: 12px; cursor: pointer; }

        /* לוח שנה */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; margin-top: 10px; }
        .day { min-height: 40px; border-radius: 10px; background: #fff7fb; display: flex; align-items: center; justify-content: center; font-size: 13px; }
        .period { background: #ff6fae !important; color: white !important; font-weight: bold; }
        .ovulation { background: #b45cff !important; color: white !important; }
        .today { border: 2px solid #ff4f9b; }

        /* מודלים מעוצבים */
        .custom-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; padding:20px; }
        .modal-box { background:white; border-radius:25px; padding:25px; max-width:400px; margin:100px auto; text-align:center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

        .entry { background: #fff1f7; border-right: 5px solid #ff5fa2; padding: 15px; border-radius: 18px; margin-top: 10px; position: relative; }
        .delete-btn { position: absolute; left: 12px; top: 12px; border: 0; background: 0; cursor: pointer; font-size: 16px; }
        #historyContent { display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- מודל הודעות מותאם -->
    <div id="msgModal" class="custom-modal">
        <div class="modal-box">
            <h3 id="modalTitle" style="color:#ff4f9b">🌸</h3>
            <p id="modalText" style="margin:15px 0; color:#86526b"></p>
            <button onclick="closeModal()" class="main-btn" style="margin-top:0">אישור</button>
        </div>
    </div>

    <div id="mainApp" class="app" style="display: none;">
        <div class="header" style="display:flex; justify-content:space-between; align-items:center; padding:10px 0 20px;">
            <div>
                <div id="greeting" style="font-weight:bold; color:#ff4f9b; font-size:18px;"></div>
                <div id="modeDisplay" style="font-size:10px; color:#86526b;"></div>
            </div>
            <button id="logoutBtn" class="logout-btn">התנתקות</button>
        </div>

        <div class="card">
            <div class="title">📅 הזנת מחזור חדש</div>
            <input type="date" id="date">
            <select id="duration">
                <option value="3">3 ימים</option><option value="4">4 ימים</option>
                <option value="5" selected>5 ימים</option><option value="6">6 ימים</option>
                <option value="7">7 ימים</option>
            </select>
            <button id="saveBtn" class="main-btn">שמירה ביומן ✨</button>
        </div>

        <div class="card" id="predCard" style="display:none;">
            <div class="title">🔮 תחזית וביוץ</div>
            <div id="prediction" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button id="prevMonth" style="border:0; background:0; font-size:20px;">◀️</button>
                <strong id="monthTitle"></strong>
                <button id="nextMonth" style="border:0; background:0; font-size:20px;">▶️</button>
            </div>
            <div id="calendar" class="calendar"></div>
        </div>

        <div class="card">
            <div class="title">⚙️ ניהול והגדרות</div>
            <button onclick="exportData()" class="secondary-btn">📊 הורדת דוח לרופא</button>
            <button id="toggleModeBtn" class="secondary-btn" style="background:#fff1f7">🔄 החלפת מצב שימוש</button>
        </div>

        <div class="card">
            <div class="title" onclick="toggleHistory()">📖 היסטוריה ▼</div>
            <div id="historyContent"><div id="list"></div></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, getDocs, deleteDoc, doc, setDoc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC3GgMwsc-30RoK7bKiCdaw8P6kZz-hLfg",
            authDomain: "perioday1.firebaseapp.com",
            projectId: "perioday1",
            storageBucket: "perioday1.firebasestorage.app",
            messagingSenderId: "926275939384",
            appId: "1:926275939384:web:7a40c16c0254bbc6038acd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        let userMode = 'regular';
        let globalData = []; // Cache מקומי לביצועים

        // חלונית הודעה מותאמת
        window.showAlert = (title, text) => {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            document.getElementById('msgModal').style.display = 'block';
        };
        window.closeModal = () => document.getElementById('msgModal').style.display = 'none';

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userSnap = await getDoc(doc(db, "users_metadata", user.uid));
                if (userSnap.exists()) {
                    userMode = userSnap.data().mode || 'regular';
                    updateUI(userSnap.data().name);
                    loadData();
                } else { /* Logic for setup screen... */ }
            } else { /* Redirect to login... */ }
        });

        function updateUI(name) {
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('greeting').innerText = `שלום, ${name} 🌸`;
            document.getElementById('modeDisplay').innerText = `מצב: ${userMode === 'regular' ? 'מעקב רגיל' : 'תכנון היריון'}`;
        }

        document.getElementById('saveBtn').onclick = async () => {
            const dateInput = document.getElementById("date").value;
            if (!dateInput) return;

            // וולידציה: מניעת תאריך עתידי
            if (new Date(dateInput) > new Date()) {
                return showAlert("אופס...", "לא ניתן להזין תאריך עתידי.");
            }

            // וולידציה: מניעת כפילויות
            if (globalData.some(e => e.date === dateInput)) {
                return showAlert("שימי לב", "כבר קיים רישום לתאריך זה.");
            }

            const entry = { date: dateInput, duration: parseInt(document.getElementById("duration").value) };
            await addDoc(collection(db, "users", currentUser.uid, "entries"), { ...entry, timestamp: serverTimestamp() });
            
            // עדכון ה-Cache המקומי מבלי לקרוא הכל מחדש
            globalData.unshift(entry);
            render(globalData);
            showAlert("הצלחה!", "הנתונים נשמרו ביומן.");
        };

        document.getElementById('toggleModeBtn').onclick = async () => {
            userMode = userMode === 'regular' ? 'conception' : 'regular';
            await updateDoc(doc(db, "users_metadata", currentUser.uid), { mode: userMode });
            updateUI(currentUser.displayName); // עדכון UI ללא Reload
            render(globalData);
        };

        // שאר הפונקציות (render, loadData, calendar) נשמרות עם אופטימיזציה ל-globalData...
    </script>
</body>
</html>
