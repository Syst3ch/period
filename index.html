<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>יומן מחזור Pro</title>
    <meta name="theme-color" content="#ff5fa2">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #ffd6e8, #fff6fa);
            color: #351126;
            min-height: 100vh;
            overflow-x: hidden; /* מונע בריחה לצדדים */
        }

        .app { 
            max-width: 500px; 
            margin: auto; 
            padding: 15px; 
        }

        .header { text-align: center; padding: 25px 10px; }
        .header h1 { font-size: 32px; margin-bottom: 5px; color: #351126; }
        .header p { color: #86526b; font-size: 14px; }

        .card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(190, 70, 120, .1);
            width: 100%; /* מבטיח שהכרטיס לא יצא מהמסך */
        }

        .title { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #ff4f9b; display: flex; align-items: center; gap: 8px; }
        
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; color: #5a203d; margin-bottom: 5px; }
        
        /* תיקון קריטי לשדות הקלט */
        input, textarea {
            width: 100%; 
            padding: 14px; 
            border: 1.5px solid #f3aacb;
            border-radius: 18px; 
            background: #fff7fb; 
            font-size: 16px; 
            outline: none;
            display: block;
            appearance: none; /* מסיר עיצוב דפדפן מקורי */
        }

        /* Symptom Selector */
        .symptoms { 
            display: flex; 
            gap: 8px; 
            margin-top: 10px; 
            overflow-x: auto; 
            padding: 5px 2px;
            scrollbar-width: none; /* מסתיר פס גלילה */
        }
        .symptoms::-webkit-scrollbar { display: none; }

        .symptom-tag {
            padding: 8px 12px; 
            border: 1.5px solid #f3aacb; 
            border-radius: 15px;
            background: white; 
            cursor: pointer; 
            font-size: 13px; 
            white-space: nowrap; 
            transition: 0.2s;
            flex-shrink: 0;
        }
        .symptom-tag.active { background: #ff4f9b; color: white; border-color: #ff4f9b; }

        button.main-btn {
            width: 100%; border: 0; border-radius: 20px; padding: 16px; margin-top: 20px;
            background: linear-gradient(135deg, #ff4f9b, #ff91c2); color: white;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 15px rgba(255, 79, 155, 0.3);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box { background: #fff1f7; border: 2px solid #ffd1e3; border-radius: 20px; padding: 12px; text-align: center; }
        .box strong { display: block; color: #873557; font-size: 12px; margin-bottom: 4px; }
        .box span { display: block; font-size: 16px; font-weight: 800; color: #351126; }
        .box .countdown { font-size: 11px; color: #ff4f9b; margin-top: 3px; font-weight: bold; }

        .calendar-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .day { min-height: 40px; border-radius: 10px; background: #fff7fb; display: flex; align-items: center; justify-content: center; font-size: 13px; }
        
        .period { background: #ff6fae !important; color: white !important; font-weight: bold; }
        .ovulation { background: #b45cff !important; color: white !important; }
        .fertile { background: #ffd1e3; color: #5b1838; }
        .today { border: 2px solid #ff4f9b; }

        .entry { background: #fff1f7; border-right: 5px solid #ff5fa2; padding: 15px; border-radius: 18px; margin-top: 12px; position: relative; }
        .delete-btn { position: absolute; left: 12px; top: 12px; background: none; border: none; font-size: 16px; cursor: pointer; }
        
        .footer { font-size: 11px; color: #86526b; text-align: center; margin-top: 25px; padding-bottom: 20px; }

        /* התאמה למסכים ממש קטנים */
        @media (max-width: 350px) {
            .grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 26px; }
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="header">
            <h1>🌸 יומן מחזור</h1>
            <p>חכם, אישי ומדויק</p>
        </div>

        <div class="card">
            <div class="title">✨ רישום חדש</div>
            <label>תאריך תחילת וסת</label>
            <input type="date" id="date">

            <label>איך ההרגשה?</label>
            <div class="symptoms">
                <div class="symptom-tag" onclick="toggleSymptom(this)">🥨 מתוק</div>
                <div class="symptom-tag" onclick="toggleSymptom(this)">⚡ כאב</div>
                <div class="symptom-tag" onclick="toggleSymptom(this)">🎈 נפיחות</div>
                <div class="symptom-tag" onclick="toggleSymptom(this)">😴 עייפות</div>
                <div class="symptom-tag" onclick="toggleSymptom(this)">😡 עצבנות</div>
            </div>

            <label>הערות</label>
            <textarea id="notes" rows="2" placeholder="משהו נוסף..."></textarea>

            <button class="main-btn" onclick="addEntry()">שמור וחשב תחזית 💗</button>
        </div>

        <div class="card">
            <div class="title">🔮 תחזית חכמה</div>
            <div id="prediction" class="grid"></div>
        </div>

        <div class="card">
            <div class="calendar-head">
                <button onclick="changeMonth(-1)" style="border:0; background:0; font-size:20px;">◀️</button>
                <strong id="monthTitle"></strong>
                <button onclick="changeMonth(1)" style="border:0; background:0; font-size:20px;">▶️</button>
            </div>
            <div class="calendar" id="calendar"></div>
        </div>

        <div class="card">
            <div class="title">📖 היסטוריה</div>
            <div id="list"></div>
        </div>

        <div class="footer">המידע הינו להערכה בלבד. 💖</div>
    </div>

    <script>
        const KEY = "period_pro_v2";
        let viewDate = new Date();

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("date").valueAsDate = new Date();
            render();
        });

        function toggleSymptom(el) { el.classList.toggle('active'); }
        function getData() { return JSON.parse(localStorage.getItem(KEY) || "[]") }
        function saveData(data) { localStorage.setItem(KEY, JSON.stringify(data)) }

        function addEntry() {
            const date = document.getElementById("date").value;
            if (!date) return alert("נא לבחור תאריך");
            const symptoms = Array.from(document.querySelectorAll('.symptom-tag.active')).map(el => el.innerText);
            const notes = document.getElementById("notes").value.trim();
            const data = getData();
            data.unshift({ id: Date.now(), date, days: 5, symptoms, notes });
            saveData(data);
            document.getElementById("notes").value = "";
            document.querySelectorAll('.symptom-tag').forEach(t => t.classList.remove('active'));
            render();
            alert("נשמר בהצלחה! ✨");
        }

        function deleteEntry(id) {
            if (confirm("למחוק?")) { saveData(getData().filter(e => e.id !== id)); render(); }
        }

        function calculateCycle() {
            const data = getData();
            if (data.length < 2) return { avg: 28, next: null };
            let gaps = [];
            for (let i = 0; i < data.length - 1; i++) {
                let diff = Math.round((new Date(data[i].date) - new Date(data[i+1].date)) / 86400000);
                if (diff > 20 && diff < 45) gaps.push(diff);
            }
            const avg = gaps.length ? Math.round(gaps.reduce((a,b)=>a+b)/gaps.length) : 28;
            const next = new Date(data[0].date);
            next.setDate(next.getDate() + avg);
            return { avg, next };
        }

        function render() {
            const data = getData();
            const { avg, next } = calculateCycle();
            const predDiv = document.getElementById("prediction");
            
            if (!data.length) {
                predDiv.parentElement.style.display = "none";
            } else {
                predDiv.parentElement.style.display = "block";
                const nextDate = next || new Date(new Date(data[0].date).setDate(new Date(data[0].date).getDate() + 28));
                const diffDays = Math.ceil((nextDate - new Date()) / 86400000);
                const countdown = diffDays > 0 ? `בעוד ${diffDays} ימים` : (diffDays === 0 ? "היום!" : "באיחור");
                const ovulation = new Date(nextDate); ovulation.setDate(ovulation.getDate() - 14);

                predDiv.innerHTML = `
                    <div class="box"><strong>המחזור הבא</strong><span>${nextDate.toLocaleDateString('he-IL')}</span><div class="countdown">${countdown}</div></div>
                    <div class="box"><strong>ביוץ משוער</strong><span>${ovulation.toLocaleDateString('he-IL')}</span></div>
                    <div class="box"><strong>אורך ממוצע</strong><span>${avg} ימים</span></div>
                    <div class="box"><strong>סטטוס</strong><span>${diffDays < 5 ? 'מתקרב' : 'רגיל'}</span></div>`;
            }

            renderCalendar(data, next);
            const listDiv = document.getElementById("list");
            listDiv.innerHTML = data.length ? "" : "<p style='text-align:center; color:#86526b;'>אין רישומים עדיין</p>";
            data.slice(0, 3).forEach(e => {
                const d = document.createElement("div");
                d.className = "entry";
                d.innerHTML = `<button class="delete-btn" onclick="deleteEntry(${e.id})">🗑️</button>
                    <strong>${new Date(e.date).toLocaleDateString('he-IL')}</strong><br>
                    <small>${e.symptoms.join(', ') || 'ללא תסמינים'}</small>`;
                listDiv.appendChild(d);
            });
        }

        function renderCalendar(data, nextDate) {
            const cal = document.getElementById("calendar");
            cal.innerHTML = "";
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            document.getElementById("monthTitle").innerText = viewDate.toLocaleDateString('he-IL', { month: 'long', year: 'numeric' });
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) cal.innerHTML += `<div class="day" style="background:none"></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const curr = new Date(year, month, d);
                let cls = (new Date().toDateString() === curr.toDateString()) ? "today" : "";
                data.forEach(entry => {
                    const start = new Date(entry.date);
                    const end = new Date(start); end.setDate(end.getDate() + 4);
                    if (curr >= start && curr <= end) cls += " period";
                });
                if (nextDate) {
                    const ovul = new Date(nextDate); ovul.setDate(ovul.getDate() - 14);
                    if (curr.toDateString() === ovul.toDateString()) cls += " ovulation";
                }
                cal.innerHTML += `<div class="day ${cls}">${d}</div>`;
            }
        }
        function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); render(); }
    </script>
</body>
</html>
