<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יומן מחזור</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff5fa2">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial;
  background:linear-gradient(160deg,#ffd6e8,#fff6fa);
  overflow-x:hidden;
}

.app{
  max-width:520px;
  margin:auto;
  padding:20px;
}

h1{text-align:center;margin-bottom:10px}

.card{
  background:white;
  border-radius:25px;
  padding:20px;
  margin-bottom:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input,textarea{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:12px;
  border:1.5px solid pink;
}

button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:14px;
  background:#ff5fa2;
  color:white;
  font-weight:bold;
}

.pred{
  background:#fff0f7;
  padding:12px;
  border-radius:12px;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="app">
<h1>🌸 יומן מחזור</h1>

<div class="card">
<label>📅 תאריך תחילת וסת</label>
<input type="date" id="date">

<label>🩸 מספר ימים</label>
<input type="number" id="days" value="5">

<label>📝 הערות</label>
<textarea id="notes"></textarea>

<button onclick="add()">שמור וחישוב 💗</button>
</div>

<div class="card">
<h3>📊 תחזית</h3>
<div id="prediction">אין נתונים</div>
</div>

<div class="card">
<h3>📅 לוח שנה</h3>
<div id="calendar"></div>
</div>

</div>

<script>
const KEY="cycle";

function get(){return JSON.parse(localStorage.getItem(KEY)||"[]")}
function set(d){localStorage.setItem(KEY,JSON.stringify(d))}

function add(){
  const date=document.getElementById("date").value;
  const days=Number(document.getElementById("days").value);
  const notes=document.getElementById("notes").value;

  if(!date)return alert("בחר תאריך");

  const data=get();
  data.unshift({date,days,notes});
  set(data);
  render();
}

function render(){
  const data=get();
  const p=document.getElementById("prediction");

  if(!data.length){
    p.innerHTML="הכנס נתונים כדי לראות תחזית";
    return;
  }

  const last=new Date(data[0].date);
  const next=new Date(last);
  next.setDate(next.getDate()+28);

  const ovu=new Date(next);
  ovu.setDate(ovu.getDate()-14);

  p.innerHTML=`
    <div class="pred">מחזור הבא: ${next.toLocaleDateString("he-IL")}</div>
    <div class="pred">ביוץ: ${ovu.toLocaleDateString("he-IL")}</div>
  `;
}

render();

if("serviceWorker" in navigator){
 navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
