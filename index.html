<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>יומן מחזור Smart Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #ffd6e8, #fff6fa);
            color: #351126;
            min-height: 100vh;
        }
        .app, .login-screen { max-width: 500px; margin: auto; padding: 20px; }
        .login-screen { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center;
        }
        .card {
            background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(190, 70, 120, .1); width: 100%;
        }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #ff4f9b; display: flex; align-items: center; justify-content: space-between; }
        
        input, textarea, .main-btn {
            width: 100%; padding: 14px; border-radius: 18px; border: 1.5px solid #f3aacb; margin-top: 10px; font-size: 16px; outline: none;
        }
        /* תיקון לשדה התאריך שלא יחרוג מהפינה */
        input[type="date"] {
            font-family: inherit;
            -webkit-appearance: none;
        }
        
        .main-btn {
            background: linear-gradient(135deg, #ff4f9b, #ff91c2); color: white; border: 0; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 15px rgba(255, 79, 155, 0.3);
        }
        .logout-btn { background: #f3f3f3; color: #86526b; border: 0; padding: 8px 12px; border-radius: 12px; font-size: 12px; cursor: pointer; }
        
        .symptoms { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .symptom-tag {
            padding: 8px 12px; border: 1.5px solid #f3aacb; border-radius: 15px; background: white; font-size: 13px; white-space: nowrap; cursor: pointer; flex-shrink: 0;
        }
        .symptom-tag.active { background: #ff4f9b; color: white; border-color: #ff4f9b; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box { background: #fff1f7; border: 2px solid #ffd1e3; border-radius: 20px; padding: 12px; text-align: center; }
        .box strong { display: block; color: #873557; font-size: 12px; }
        .box span { display: block; font-size: 16px; font-weight: 800; }
        
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; margin-top: 10px; }
        .day { min-height: 40px; border-radius: 10px; background: #fff7fb; display: flex; align-items: center; justify-content: center; font-size: 13px; }
        .period { background: #ff6fae !important; color: white !important; font-weight: bold; }
        .ovulation { background: #b45cff !important; color: white !important; }
        .today { border: 2px solid #ff4f9b; }

        .entry { background: #fff1f7; border-right: 5px solid #ff5fa2; padding: 15px; border-radius: 18px; margin-top: 10px; position: relative; }
        .delete-btn { position: absolute; left: 12px; top: 12px; border: 0; background: 0; cursor: pointer; font-size: 16px; }
    </style>
</head>

<body>
    <div id="loginScreen" class="login-screen">
        <h1 style="font-size: 50px; margin-bottom: 10px;">🌸</h1>
        <h2 style="color: #ff4f9b;">יומן מחזור חכם</h2>
        <p style="margin-bottom: 25px; color: #86526b; padding: 0 20px;">התחברי כדי לשמור את הנתונים שלך בענן בצורה מאובטחת</p>
        <button class="main-btn" onclick="login()" style="width: 80%;">התחברות עם Google 🚀</button>
    </div>

    <div id="mainApp" class="app" style="display: none;">
        <div class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0 20px;">
            <h1 style="font-size: 20px;">🌸 שלום, <span id="userName"></span></h1>
            <button class="logout-btn" onclick="logout()">התנתקות</button>
        </div>

        <div class="card">
            <div class="title">✨ רישום חדש</div>
            <input type="date" id="date">
            <div class="symptoms">
                <div class="symptom-tag" onclick="toggleSymptom(this)">🥨 מתוק</div>
                <div class="symptom-tag" onclick="toggleSymptom(this)">⚡ כאב</div>
                <div class="symptom-tag" onclick="toggleSymptom(this)">😴 עייפות</div>
                <div class="symptom-tag" onclick="toggleSymptom(this)">😡 עצבנות</div>
                <div class="symptom-tag" onclick="toggleSymptom(this)">🎈 נפיחות</div>
            </div>
            <textarea id="notes" rows="2" placeholder="איך את מרגישה היום?"></textarea>
            <button class="main-btn" onclick="addEntry()">שמור בענן 💗</button>
        </div>

        <div class="card" id="predCard" style="display:none;">
            <div class="title">🔮 תחזית חכמה</div>
            <div id="prediction" class="grid"></div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button onclick="changeMonth(-1)" style="border:0; background:0; font-size:20px;">◀️</button>
                <strong id="monthTitle"></strong>
                <button onclick="changeMonth(1)" style="border:0; background:0; font-size:20px;">▶️</button>
            </div>
            <div id="calendar" class="calendar"></div>
        </div>

        <div class="card">
            <div class="title">📖 היסטוריה</div>
            <div id="list"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCdv3UObqCtVHj1Y7NMQoI4NgSHoYbsUfI",
            authDomain: "period-52005.firebaseapp.com",
            projectId: "period-52005",
            storageBucket: "period-52005.firebasestorage.app",
            messagingSenderId: "185159920438",
            appId: "1:185159920438:web:879ee4ad37a76305cc2197"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let currentUser = null;
        let viewDate = new Date();

        // ניהול מצב התחברות חכם משופר
        auth.onAuthStateChanged(async (user) => {
            const loginScreen = document.getElementById('loginScreen');
            const mainApp = document.getElementById('mainApp');

            if (user) {
                currentUser = user;
                document.getElementById('userName').innerText = user.displayName ? user.displayName.split(' ')[0] : "חברה";
                loginScreen.style.display = 'none';
                mainApp.style.display = 'block';
                document.getElementById("date").valueAsDate = new Date();
                loadData();
            } else {
                // בדיקה אם המשתמש בדיוק חזר מתהליך התחברות
                try {
                    const result = await auth.getRedirectResult();
                    if (result && result.user) {
                        // אם יש משתמש מה-Redirect, onAuthStateChanged יקרא שוב אוטומטית
                        return;
                    }
                } catch (error) {
                    console.error("שגיאה בחזרה מהתחברות:", error.message);
                    if (error.code === 'auth/unauthorized-domain') {
                        alert("שגיאה: הדומיין perioday.com לא מאושר ב-Firebase.");
                    }
                }
                loginScreen.style.display = 'flex';
                mainApp.style.display = 'none';
            }
        });

        async function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            await auth.signInWithRedirect(provider);
        }

        async function logout() {
            if(confirm("להתנתק מהחשבון?")) await auth.signOut();
        }

        function toggleSymptom(el) { el.classList.toggle('active'); }

        async function addEntry() {
            const date = document.getElementById("date").value;
            if (!date || !currentUser) return alert("נא לבחור תאריך");
            
            const entry = {
                date,
                symptoms: Array.from(document.querySelectorAll('.symptom-tag.active')).map(el => el.innerText),
                notes: document.getElementById("notes").value.trim(),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            await db.collection("users").doc(currentUser.uid).collection("entries").add(entry);
            document.getElementById("notes").value = "";
            document.querySelectorAll('.symptom-tag').forEach(t => t.classList.remove('active'));
            loadData();
            alert("נשמר בהצלחה בענן! ✨");
        }

        async function deleteEntry(id) {
            if(confirm("למחוק את הרישום?")) {
                await db.collection("users").doc(currentUser.uid).collection("entries").doc(id).delete();
                loadData();
            }
        }

        async function loadData() {
            if (!currentUser) return;
            const snapshot = await db.collection("users").doc(currentUser.uid).collection("entries").orderBy("date", "desc").get();
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            render(data);
        }

        function render(data) {
            const predCard = document.getElementById("predCard");
            if (data.length >= 2) {
                predCard.style.display = "block";
                let gaps = [];
                for (let i = 0; i < data.length - 1; i++) {
                    let d1 = new Date(data[i].date); 
                    let d2 = new Date(data[i+1].date);
                    let diff = Math.round((d1 - d2) / 86400000);
                    if (diff > 20 && diff < 45) gaps.push(diff);
                }
                const avg = gaps.length ? Math.round(gaps.reduce((a,b)=>a+b)/gaps.length) : 28;
                const next = new Date(data[0].date); 
                next.setDate(next.getDate() + avg);
                const diffDays = Math.ceil((next - new Date()) / 86400000);
                const ovul = new Date(next); 
                ovul.setDate(ovul.getDate() - 14);

                document.getElementById("prediction").innerHTML = `
                    <div class="box"><strong>המחזור הבא</strong><span>${next.toLocaleDateString('he-IL')}</span><div style="font-size:11px;color:#ff4f9b">בעוד ${diffDays} ימים</div></div>
                    <div class="box"><strong>ביוץ משוער</strong><span>${ovul.toLocaleDateString('he-IL')}</span></div>
                `;
                renderCalendar(data, next);
            } else {
                predCard.style.display = "none";
                renderCalendar(data, null);
            }

            const list = document.getElementById("list");
            list.innerHTML = data.length ? "" : "<p style='text-align:center;'>אין נתונים</p>";
            data.slice(0, 5).forEach(e => {
                list.innerHTML += `<div class="entry">
                    <button class="delete-btn" onclick="deleteEntry('${e.id}')">🗑️</button>
                    <strong>${new Date(e.date).toLocaleDateString('he-IL')}</strong><br>
                    <small>${e.symptoms.join(', ') || 'ללא תסמינים'}</small>
                </div>`;
            });
        }

        function renderCalendar(data, nextDate) {
            const cal = document.getElementById("calendar");
            cal.innerHTML = "";
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            document.getElementById("monthTitle").innerText = viewDate.toLocaleDateString('he-IL', { month: 'long', year: 'numeric' });
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) cal.innerHTML += `<div></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const curr = new Date(year, month, d);
                let cls = (new Date().toDateString() === curr.toDateString()) ? "today" : "";
                data.forEach(entry => {
                    const start = new Date(entry.date);
                    const end = new Date(start); 
                    end.setDate(end.getDate() + 4);
                    if (curr >= start && curr <= end) cls += " period";
                });
                if (nextDate) {
                    const ovul = new Date(nextDate); 
                    ovul.setDate(ovul.getDate() - 14);
                    if (curr.toDateString() === ovul.toDateString()) cls += " ovulation";
                }
                cal.innerHTML += `<div class="day ${cls}">${d}</div>`;
            }
        }

        function changeMonth(s) { 
            viewDate.setMonth(viewDate.getMonth() + s); 
            loadData(); 
        }
    </script>
</body>
</html>
