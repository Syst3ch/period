<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יומן מחזור</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff5fa2">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial;
  background:linear-gradient(160deg,#ffd6e8,#fff6fa);
  color:#351126;
}

.app{
  max-width:540px;
  margin:auto;
  padding:18px;
}

.header{
  text-align:center;
  padding:25px 10px;
}

.header h1{font-size:34px}
.header p{color:#86526b;margin-top:8px}

.card{
  background:white;
  border-radius:28px;
  padding:20px;
  margin-bottom:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.title{
  font-size:20px;
  font-weight:bold;
  margin-bottom:12px;
}

label{display:block;margin-top:12px;font-weight:bold}

input,textarea{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:1.5px solid #f3aacb;
  border-radius:18px;
  background:#fff7fb;
  font-size:16px;
  text-align:right;
}

input[type="date"]{
  direction:rtl;
  text-align:right;
}

button{
  width:100%;
  padding:14px;
  margin-top:16px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#ff4f9b,#ff91c2);
  color:white;
  font-size:16px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  background:#fff0f7;
  padding:12px;
  border-radius:14px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  text-align:center;
}

.day{
  padding:8px;
  border-radius:10px;
  background:#fff7fb;
}

.period{background:#ff6fae;color:white}
.ovulation{background:#b45cff;color:white}
.fertile{background:#ffd1e3}

.today{outline:2px solid #ff4f9b}
</style>
</head>

<body>

<div class="app">

<div class="header">
<h1>🌸 יומן מחזור</h1>
<p>רישום וסת, ביוץ ופוריות</p>
</div>

<div class="card">
<div class="title">הוספת רישום</div>

<label>📅 תאריך תחילת וסת</label>
<input type="date" id="date">

<label>🩸 מספר ימים</label>
<input type="number" id="days" value="5">

<label>📝 הערות</label>
<textarea id="notes"></textarea>

<button onclick="add()">שמור וחישוב 💗</button>
</div>

<div class="card">
<div class="title">תחזית</div>
<div id="prediction">אין נתונים</div>
</div>

<div class="card">
<div class="title">לוח שנה</div>
<div id="calendar" class="calendar"></div>
</div>

</div>

<script>
const KEY="period_data";

function get(){return JSON.parse(localStorage.getItem(KEY)||"[]")}
function set(d){localStorage.setItem(KEY,JSON.stringify(d))}

function add(){
  const date=document.getElementById("date").value;
  const days=Number(document.getElementById("days").value);

  if(!date)return alert("בחר תאריך");

  const data=get();
  data.unshift({date,days});
  set(data);
  render();
}

function avg(data){
  if(data.length<2)return 28;
  let arr=[];
  for(let i=0;i<data.length-1;i++){
    let d1=new Date(data[i].date);
    let d2=new Date(data[i+1].date);
    arr.push((d1-d2)/86400000);
  }
  return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
}

function render(){
  const data=get();
  const p=document.getElementById("prediction");
  const cal=document.getElementById("calendar");

  if(!data.length){
    p.innerHTML="הוסף נתונים";
    return;
  }

  const cycle=avg(data);
  const last=new Date(data[0].date);

  const next=new Date(last);
  next.setDate(next.getDate()+cycle);

  const ovu=new Date(next);
  ovu.setDate(ovu.getDate()-14);

  const f1=new Date(ovu);
  f1.setDate(f1.getDate()-5);

  const f2=new Date(ovu);
  f2.setDate(f2.getDate()+1);

  p.innerHTML=`
    <div class="box">מחזור הבא: ${next.toLocaleDateString("he-IL")}</div>
    <div class="box">ביוץ: ${ovu.toLocaleDateString("he-IL")}</div>
  `;

  cal.innerHTML="";

  const today=new Date();

  for(let i=1;i<=30;i++){
    const d=new Date();
    d.setDate(i);

    let cls="day";

    if(d>=f1 && d<=f2)cls+=" fertile";
    if(d.toDateString()==ovu.toDateString())cls+=" ovulation";

    data.forEach(e=>{
      let s=new Date(e.date);
      let eDate=new Date(e.date);
      eDate.setDate(eDate.getDate()+e.days-1);
      if(d>=s && d<=eDate)cls+=" period";
    });

    if(d.toDateString()==today.toDateString())cls+=" today";

    cal.innerHTML+=`<div class="${cls}">${i}</div>`;
  }
}

render();
</script>

</body>
</html>
