<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יומן מחזור Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff5fa2">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0 }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #ffd6e8, #fff6fa);
            color: #351126;
            min-height: 100-vh;
        }
        .app { max-width: 540px; margin: auto; padding: 20px 20px 50px }
        .header { text-align: center; padding: 30px 10px }
        .header h1 { font-size: 38px; margin-bottom: 5px; color: #351126; }
        .header p { color: #86526b; font-size: 15px }

        .card {
            background: white;
            border-radius: 30px;
            padding: 22px;
            margin-bottom: 20px;
            box-shadow: 0 15px 40px rgba(190, 70, 120, .12);
        }
        .title { font-size: 22px; font-weight: bold; margin-bottom: 15px; color: #ff4f9b; display: flex; align-items: center; gap: 8px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; color: #5a203d; }
        
        input, textarea {
            width: 100%; padding: 15px; margin-top: 8px; border: 1.5px solid #f3aacb;
            border-radius: 20px; background: #fff7fb; font-size: 16px; outline: none;
        }

        /* Symptom Selector */
        .symptoms { display: flex; gap: 10px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; }
        .symptom-tag {
            padding: 8px 15px; border: 1.5px solid #f3aacb; border-radius: 15px;
            background: white; cursor: pointer; font-size: 14px; white-space: nowrap; transition: 0.2s;
        }
        .symptom-tag.active { background: #ff4f9b; color: white; border-color: #ff4f9b; }

        button.main-btn {
            width: 100%; border: 0; border-radius: 20px; padding: 18px; margin-top: 20px;
            background: linear-gradient(135deg, #ff4f9b, #ff91c2); color: white;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: transform 0.2s;
            box-shadow: 0 8px 20px rgba(255, 79, 155, 0.3);
        }
        button.main-btn:active { transform: scale(0.98); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .box { background: #fff1f7; border: 2.5px solid #ffd1e3; border-radius: 22px; padding: 15px; text-align: center; }
        .box strong { display: block; color: #873557; font-size: 13px; margin-bottom: 5px; }
        .box span { display: block; font-size: 18px; font-weight: 800; color: #351126; }
        .box .countdown { font-size: 12px; color: #ff4f9b; margin-top: 4px; font-weight: bold; }

        .calendar-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .day { min-height: 45px; border-radius: 12px; background: #fff7fb; display: flex; align-items: center; justify-content: center; font-size: 14px; position: relative; }
        .period { background: #ff6fae; color: white; font-weight: bold; }
        .fertile { background: #ffd1e3; color: #5b1838; }
        .ovulation { background: #b45cff; color: white; box-shadow: 0 0 10px rgba(180, 92, 255, 0.5); }
        .today { border: 2px solid #ff4f9b; }

        .entry { background: #fff1f7; border-right: 6px solid #ff5fa2; padding: 15px; border-radius: 20px; margin-top: 12px; position: relative; }
        .delete-btn { position: absolute; left: 15px; top: 15px; background: none; border: none; color: #d9366f; font-weight: bold; cursor: pointer; }
        
        .footer { font-size: 11px; color: #86526b; text-align: center; margin-top: 30px; opacity: 0.8; }
    </style>
</head>

<body>
    <div class="app">
        <div class="header">
            <h1>🌸 יומן מחזור</h1>
            <p>חכם, אישי ומדויק</p>
        </div>

        <!-- הוספת רישום -->
        <div class="card">
            <div class="title">✨ רישום חדש</div>
            <label>תאריך תחילת וסת</label>
            <input type="date" id="date">

            <label>איך ההרגשה? (תסמינים)</label>
            <div class="symptoms" id="symptomContainer">
                <div class="symptom-tag" onclick="toggleSymptom(this)">🥨 חשק למתוק</div>
                <div class="symptom-tag" onclick="toggleSymptom(this)">⚡ כאבי גב</div>
                <div class="symptom-tag" onclick="toggleSymptom(this)">🎈 נפיחות</div>
                <div class="symptom-tag" onclick="toggleSymptom(this)">😴 עייפות</div>
                <div class="symptom-tag" onclick="toggleSymptom(this)">😡 עצבנות</div>
            </div>

            <label>הערות נוספות</label>
            <textarea id="notes" placeholder="משהו נוסף שחשוב לזכור..."></textarea>

            <button class="main-btn" onclick="addEntry()">שמור וחשב תחזית 💗</button>
        </div>

        <!-- תחזית חכמה -->
        <div class="card">
            <div class="title">🔮 תחזית חכמה</div>
            <div id="prediction" class="grid">
                <!-- יתמלא ע"י JS -->
            </div>
        </div>

        <!-- לוח שנה -->
        <div class="card">
            <div class="calendar-head">
                <button onclick="changeMonth(-1)" style="background:none; border:none; cursor:pointer;">◀️</button>
                <strong id="monthTitle"></strong>
                <button onclick="changeMonth(1)" style="background:none; border:none; cursor:pointer;">▶️</button>
            </div>
            <div class="calendar" id="calendar"></div>
        </div>

        <!-- היסטוריה -->
        <div class="card">
            <div class="title">📖 היסטוריה</div>
            <div id="list"></div>
        </div>

        <div class="footer">המידע הינו להערכה בלבד. 💖</div>
    </div>

    <script>
        const KEY = "period_pro_v2";
        let viewDate = new Date();

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("date").valueAsDate = new Date();
            render();
        });

        function toggleSymptom(el) { el.classList.toggle('active'); }

        function getData() { return JSON.parse(localStorage.getItem(KEY) || "[]") }
        function saveData(data) { localStorage.setItem(KEY, JSON.stringify(data)) }

        function addEntry() {
            const date = document.getElementById("date").value;
            if (!date) return alert("נא לבחור תאריך");

            const symptoms = Array.from(document.querySelectorAll('.symptom-tag.active')).map(el => el.innerText);
            const notes = document.getElementById("notes").value.trim();

            const data = getData();
            data.unshift({ id: Date.now(), date, days: 5, symptoms, notes });
            saveData(data);

            // איפוס
            document.getElementById("notes").value = "";
            document.querySelectorAll('.symptom-tag').forEach(t => t.classList.remove('active'));
            
            render();
            alert("נשמר בהצלחה! ✨");
        }

        function deleteEntry(id) {
            if (confirm("למחוק?")) {
                saveData(getData().filter(e => e.id !== id));
                render();
            }
        }

        function calculateCycle() {
            const data = getData();
            if (data.length < 2) return { avg: 28, next: null };
            
            let gaps = [];
            for (let i = 0; i < data.length - 1; i++) {
                let diff = Math.round((new Date(data[i].date) - new Date(data[i+1].date)) / 86400000);
                if (diff > 20 && diff < 45) gaps.push(diff);
            }
            const avg = gaps.length ? Math.round(gaps.reduce((a,b)=>a+b)/gaps.length) : 28;
            const lastDate = new Date(data[0].date);
            const next = new Date(lastDate);
            next.setDate(next.getDate() + avg);
            
            return { avg, next, lastDate };
        }

        function render() {
            const data = getData();
            const { avg, next, lastDate } = calculateCycle();
            
            // 1. תחזית
            const predDiv = document.getElementById("prediction");
            if (!data.length) {
                predDiv.innerHTML = "<p>הזיני נתונים כדי לראות תחזית</p>";
            } else {
                const nextDate = next || new Date(new Date(data[0].date).setDate(new Date(data[0].date).getDate() + 28));
                const diffDays = Math.ceil((nextDate - new Date()) / 86400000);
                const countdownText = diffDays > 0 ? `בעוד ${diffDays} ימים` : (diffDays === 0 ? "היום!" : "באיחור");

                const ovulation = new Date(nextDate);
                ovulation.setDate(ovulation.getDate() - 14);

                predDiv.innerHTML = `
                    <div class="box"><strong>המחזור הבא</strong><span>${nextDate.toLocaleDateString('he-IL')}</span><div class="countdown">${countdownText}</div></div>
                    <div class="box"><strong>ביוץ משוער</strong><span>${ovulation.toLocaleDateString('he-IL')}</span></div>
                    <div class="box"><strong>אורך ממוצע</strong><span>${avg} ימים</span></div>
                    <div class="box"><strong>סטטוס</strong><span>${diffDays < 7 && diffDays > 0 ? 'מתקרב...' : 'רגיל'}</span></div>
                `;
            }

            // 2. לוח שנה
            renderCalendar(data, next);

            // 3. רשימה
            const listDiv = document.getElementById("list");
            listDiv.innerHTML = data.length ? "" : "<p>אין רישומים</p>";
            data.slice(0, 5).forEach(e => {
                const d = document.createElement("div");
                d.className = "entry";
                d.innerHTML = `
                    <button class="delete-btn" onclick="deleteEntry(${e.id})">🗑️</button>
                    <strong>${new Date(e.date).toLocaleDateString('he-IL')}</strong><br>
                    <small>${e.symptoms.join(', ') || 'ללא תסמינים'}</small>
                    <p style="font-size:13px; margin-top:5px;">${e.notes}</p>
                `;
                listDiv.appendChild(d);
            });
        }

        function renderCalendar(data, nextDate) {
            const cal = document.getElementById("calendar");
            cal.innerHTML = "";
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            document.getElementById("monthTitle").innerText = viewDate.toLocaleDateString('he-IL', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) cal.innerHTML += `<div class="day" style="background:none"></div>`;

            for (let d = 1; d <= daysInMonth; d++) {
                const curr = new Date(year, month, d);
                const isToday = new Date().toDateString() === curr.toDateString();
                let cls = isToday ? "today" : "";

                // צביעת ימי וסת מהעבר
                data.forEach(entry => {
                    const start = new Date(entry.date);
                    const end = new Date(start); end.setDate(end.getDate() + 4);
                    if (curr >= start && curr <= end) cls += " period";
                });

                // ביוץ עתידי
                if (nextDate) {
                    const ovul = new Date(nextDate); ovul.setDate(ovul.getDate() - 14);
                    if (curr.toDateString() === ovul.toDateString()) cls += " ovulation";
                }

                cal.innerHTML += `<div class="day ${cls}">${d}</div>`;
            }
        }

        function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); render(); }
    </script>
</body>
</html>
