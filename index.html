<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יומן מחזור</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff5fa2">

<style>
body{font-family:Arial;background:#ffe4ef;text-align:center;padding:20px}
input,button{width:100%;padding:12px;margin:8px 0}
</style>
</head>

<body>

<h1>🌸 יומן מחזור</h1>

<input type="date" id="date">
<input type="number" id="days" value="5">
<button onclick="add()">שמור</button>

<p id="out"></p>

<script>
const KEY="data";

function get(){return JSON.parse(localStorage.getItem(KEY)||"[]")}
function set(d){localStorage.setItem(KEY,JSON.stringify(d))}

function add(){
  const date=document.getElementById("date").value;
  if(!date)return;

  const d=get();
  d.unshift({date});
  set(d);
  render();
}

function render(){
  const d=get();
  if(!d.length)return;
  let next=new Date(d[0].date);
  next.setDate(next.getDate()+28);
  document.getElementById("out").innerText="מחזור הבא: "+next.toLocaleDateString("he-IL");
}

render();

if("serviceWorker" in navigator){
 navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
