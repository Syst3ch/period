<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perioday - יומן מחזור וביוץ</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #ffd6e8, #fff6fa);
            color: #351126;
            min-height: 100vh;
        }
        .app, .login-screen { max-width: 500px; margin: auto; padding: 20px; }
        .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        
        /* עיצוב הלוגו החדש */
        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-icon {
            width: 80px; height: 80px; background: linear-gradient(135deg, #ff4f9b, #ff91c2);
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            font-size: 45px; margin: 0 auto 15px; box-shadow: 0 10px 20px rgba(255, 79, 155, 0.3);
            color: white; position: relative;
        }
        .logo-text { font-size: 28px; font-weight: 800; color: #ff4f9b; letter-spacing: -1px; }
        .tagline { font-size: 14px; color: #86526b; margin-top: 5px; font-weight: 500; opacity: 0.8; }

        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(190, 70, 120, .1); width: 100%; }
        .title { font-size: 18px; font-weight: bold; margin-bottom: 12px; color: #ff4f9b; display: flex; align-items: center; gap: 8px; }
        
        label { font-size: 13px; color: #86526b; display: block; margin-top: 10px; margin-right: 5px; }
        input, select, textarea, .main-btn { width: 100%; padding: 14px; border-radius: 18px; border: 1.5px solid #f3aacb; margin-top: 5px; font-size: 16px; outline: none; }
        .main-btn { background: linear-gradient(135deg, #ff4f9b, #ff91c2); color: white; border: 0; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .logout-btn { background: #f3f3f3; color: #86526b; border: 0; padding: 8px 12px; border-radius: 12px; font-size: 12px; cursor: pointer; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box { background: #fff1f7; border: 1px solid #ffd1e3; border-radius: 18px; padding: 12px; text-align: center; }
        .box strong { display: block; color: #873557; font-size: 11px; margin-bottom: 4px; }
        .box span { font-size: 14px; font-weight: 800; color: #ff4f9b; }
        
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; margin-top: 10px; }
        .day { min-height: 40px; border-radius: 10px; background: #fff7fb; display: flex; align-items: center; justify-content: center; font-size: 13px; }
        .period { background: #ff6fae !important; color: white !important; font-weight: bold; }
        .ovulation { background: #d4a5ff !important; color: white !important; border-radius: 50%; }
        .today { border: 2px solid #ff4f9b; }

        .entry { background: #fff1f7; border-right: 5px solid #ff5fa2; padding: 15px; border-radius: 18px; margin-top: 10px; position: relative; }
        .delete-btn { position: absolute; left: 12px; top: 12px; border: 0; background: 0; cursor: pointer; font-size: 16px; }
    </style>
</head>

<body>
    <!-- מסך התחברות -->
    <div id="loginScreen" class="login-screen">
        <div class="logo-container">
            <div class="logo-icon">🌸</div>
            <div class="logo-text">Perioday</div>
            <div class="tagline">היומן האישי שלך למעקב מחזור וביוץ</div>
        </div>
        <button id="loginBtn" class="main-btn" style="width: 80%;">התחברות מאובטחת 🚀</button>
    </div>

    <!-- אפליקציה ראשית -->
    <div id="mainApp" class="app" style="display: none;">
        <div class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0 15px;">
            <div style="font-weight: bold; color: #ff4f9b; font-size: 18px;">🌸 Perioday</div>
            <button id="logoutBtn" class="logout-btn">התנתקות</button>
        </div>

        <div class="card">
            <div class="title">📅 הזנת מחזור חדש</div>
            <label>תאריך התחלה:</label>
            <input type="date" id="date">
            <label>כמה ימים נמשך?</label>
            <select id="duration">
                <option value="3">3 ימים</option><option value="4">4 ימים</option>
                <option value="5" selected>5 ימים</option><option value="6">6 ימים</option>
                <option value="7">7 ימים</option><option value="8">8 ימים</option>
            </select>
            <textarea id="notes" rows="2" placeholder="איך את מרגישה היום? (אופציונלי)" style="margin-top: 15px;"></textarea>
            <button id="saveBtn" class="main-btn">שמירה ביומן ✨</button>
        </div>

        <div class="card" id="predCard" style="display:none;">
            <div class="title">🔮 תחזית וביוץ</div>
            <div id="prediction" class="grid"></div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button id="prevMonth" style="border:0; background:0; font-size:20px;">◀️</button>
                <strong id="monthTitle"></strong>
                <button id="nextMonth" style="border:0; background:0; font-size:20px;">▶️</button>
            </div>
            <div id="calendar" class="calendar"></div>
        </div>

        <div class="card">
            <div class="title">📖 היסטוריה</div>
            <div id="list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, getDocs, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC3GgMwsc-30RoK7bKiCdaw8P6kZz-hLfg",
            authDomain: "perioday1.firebaseapp.com",
            projectId: "perioday1",
            storageBucket: "perioday1.firebasestorage.app",
            messagingSenderId: "926275939384",
            appId: "1:926275939384:web:7a40c16c0254bbc6038acd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        let viewDate = new Date();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById("date").valueAsDate = new Date();
                loadData();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
            }
        });

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        document.getElementById('saveBtn').onclick = async () => {
            const date = document.getElementById("date").value;
            const duration = parseInt(document.getElementById("duration").value);
            if (!date || !currentUser) return;
            
            await addDoc(collection(db, "users", currentUser.uid, "entries"), {
                date, duration, notes: document.getElementById("notes").value, timestamp: serverTimestamp()
            });
            
            document.getElementById("notes").value = "";
            loadData();
            alert("הנתונים נשמרו בענן! 🌸");
        };

        async function loadData() {
            if (!currentUser) return;
            const q = query(collection(db, "users", currentUser.uid, "entries"), orderBy("date", "desc"));
            const querySnapshot = await getDocs(q);
            render(querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        }

        function render(data) {
            let nextPeriod = null;
            let ovulationDate = null;
            const predCard = document.getElementById("predCard");

            if (data.length >= 2) {
                predCard.style.display = "block";
                let gaps = [];
                for (let i = 0; i < data.length - 1; i++) {
                    let diff = Math.round((new Date(data[i].date) - new Date(data[i+1].date)) / 86400000);
                    if (diff > 20 && diff < 45) gaps.push(diff);
                }
                const avgCycle = gaps.length ? Math.round(gaps.reduce((a,b)=>a+b)/gaps.length) : 28;
                nextPeriod = new Date(data[0].date);
                nextPeriod.setDate(nextPeriod.getDate() + avgCycle);
                ovulationDate = new Date(nextPeriod);
                ovulationDate.setDate(ovulationDate.getDate() - 14);

                document.getElementById("prediction").innerHTML = `
                    <div class="box"><strong>מחזור הבא</strong><span>${nextPeriod.toLocaleDateString('he-IL')}</span></div>
                    <div class="box"><strong>ביוץ משוער</strong><span>${ovulationDate.toLocaleDateString('he-IL')}</span></div>
                `;
            } else {
                predCard.style.display = "none";
            }

            renderCalendar(data, nextPeriod, ovulationDate);

            const list = document.getElementById("list");
            list.innerHTML = "";
            data.slice(0, 5).forEach(e => {
                const entryDiv = document.createElement('div');
                entryDiv.className = 'entry';
                entryDiv.innerHTML = `<button class="delete-btn">🗑️</button><strong>${new Date(e.date).toLocaleDateString('he-IL')}</strong><br><small>נמשך ${e.duration} ימים. ${e.notes}</small>`;
                entryDiv.querySelector('.delete-btn').onclick = async () => { if(confirm("למחוק לצמיתות?")) { await deleteDoc(doc(db, "users", currentUser.uid, "entries", e.id)); loadData(); } };
                list.appendChild(entryDiv);
            });
        }

        function renderCalendar(data, nextPeriod, ovulationDate) {
            const cal = document.getElementById("calendar");
            cal.innerHTML = "";
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            document.getElementById("monthTitle").innerText = viewDate.toLocaleDateString('he-IL', { month: 'long', year: 'numeric' });
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) cal.innerHTML += `<div></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const curr = new Date(year, month, d);
                let cls = (new Date().toDateString() === curr.toDateString()) ? "today" : "";
                
                data.forEach(e => {
                    const start = new Date(e.date);
                    const end = new Date(start); end.setDate(end.getDate() + e.duration - 1);
                    if (curr >= start && curr <= end) cls += " period";
                });

                if (ovulationDate && curr.toDateString() === ovulationDate.toDateString()) cls += " ovulation";
                cal.innerHTML += `<div class="day ${cls}">${d}</div>`;
            }
        }

        document.getElementById("prevMonth").onclick = () => { viewDate.setMonth(viewDate.getMonth() - 1); loadData(); };
        document.getElementById("nextMonth").onclick = () => { viewDate.setMonth(viewDate.getMonth() + 1); loadData(); };
    </script>
</body>
</html>
