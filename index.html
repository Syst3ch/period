<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Perioday - היומן שלך לאיזון, מחזור ופוריות</title>
    <meta name="description" content="Perioday - האפליקציה האישית שלך למעקב אחר מחזור, חישוב ימי ביוץ וחלון פוריות.">
    <meta name="author" content="אור שקפאתי">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #ffd6e8, #fff6fa);
            color: #351126;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .app, .login-screen, .setup-screen { max-width: 500px; margin: auto; padding: 20px; width: 100%; flex: 1; }
        .login-screen, .setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-icon {
            width: 75px; height: 75px; background: linear-gradient(135deg, #ff4f9b, #ff91c2);
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            font-size: 42px; margin: 0 auto 15px; box-shadow: 0 10px 20px rgba(255, 79, 155, 0.3);
            color: white;
        }
        .logo-text { font-size: 28px; font-weight: 800; color: #ff4f9b; }
        .tagline { font-size: 14px; color: #86526b; margin-top: 4px; font-weight: 500; }

        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(190, 70, 120, .1); }
        .title { font-size: 18px; font-weight: bold; margin-bottom: 12px; color: #ff4f9b; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        
        input, select, textarea, .main-btn { width: 100%; padding: 14px; border-radius: 18px; border: 1.5px solid #f3aacb; margin-top: 8px; font-size: 16px; outline: none; }
        .main-btn { background: linear-gradient(135deg, #ff4f9b, #ff91c2); color: white; border: 0; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        
        .logout-btn { background: white; color: #86526b; border: 1.5px solid #f3aacb; padding: 8px 12px; border-radius: 12px; font-size: 12px; cursor: pointer; }
        
        .secondary-btn { background: #f3f3f3; color: #86526b; border: 0; padding: 12px; border-radius: 15px; font-size: 14px; cursor: pointer; width: 100%; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box { background: #fff1f7; border: 1px solid #ffd1e3; border-radius: 18px; padding: 12px; text-align: center; }
        .box strong { display: block; color: #873557; font-size: 11px; margin-bottom: 4px; }
        .box span { font-size: 14px; font-weight: 800; color: #ff4f9b; }
        
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; margin-top: 10px; }
        .day { min-height: 40px; border-radius: 10px; background: #fff7fb; display: flex; align-items: center; justify-content: center; font-size: 13px; }
        .period { background: #ff6fae !important; color: white !important; font-weight: bold; }
        .ovulation { background: #b45cff !important; color: white !important; }
        .today { border: 2px solid #ff4f9b; }

        #historyContent { display: none; margin-top: 10px; }
        .toggle-arrow { transition: transform 0.3s; font-size: 14px; }
        .toggle-arrow.open { transform: rotate(180deg); }

        .entry { background: #fff1f7; border-right: 5px solid #ff5fa2; padding: 15px; border-radius: 18px; margin-top: 10px; position: relative; }
        .delete-btn { position: absolute; left: 12px; top: 12px; border: 0; background: 0; cursor: pointer; font-size: 16px; }

        footer { text-align: center; padding: 20px; font-size: 11px; color: #a37b8e; line-height: 1.6; }
    </style>
</head>

<body>
    <div id="loginScreen" class="login-screen">
        <div class="logo-container">
            <div class="logo-icon">🌸</div>
            <div class="logo-text">Perioday</div>
            <div class="tagline">היומן שלך לאיזון, מחזור ופוריות</div>
        </div>
        <button id="loginBtn" class="main-btn" style="width: 80%;">כניסה עם Google 🚀</button>
    </div>

    <div id="setupScreen" class="setup-screen" style="display: none;">
        <div class="logo-icon">✨</div>
        <h2>נעים להכיר!</h2>
        <input type="text" id="customName" placeholder="איך תרצי שנקרא לך?">
        <label style="font-size: 13px; margin-top: 15px; color: #86526b;">בחרי מצב שימוש:</label>
        <select id="initialMode">
            <option value="regular">מעקב מחזור רגיל</option>
            <option value="conception">תכנון היריון</option>
        </select>
        <button id="saveNameBtn" class="main-btn">בואי נתחיל 🌸</button>
    </div>

    <div id="mainApp" class="app" style="display: none;">
        <div class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0 20px;">
            <div>
                <div id="greeting" style="font-weight: bold; color: #ff4f9b; font-size: 18px;">שלום</div>
                <div id="modeDisplay" style="font-size: 10px; color: #86526b;">מצב: מעקב רגיל</div>
            </div>
            <button id="logoutBtn" class="logout-btn">התנתקות</button>
        </div>

        <div class="card">
            <div class="title">📅 הזנת מחזור חדש</div>
            <input type="date" id="date">
            <select id="duration">
                <option value="3">3 ימים</option><option value="4">4 ימים</option>
                <option value="5" selected>5 ימים</option><option value="6">6 ימים</option>
                <option value="7">7 ימים</option>
            </select>
            <textarea id="notes" rows="2" placeholder="הערות אופציונליות..."></textarea>
            <button id="saveBtn" class="main-btn">שמירה ביומן ✨</button>
        </div>

        <div class="card" id="predCard" style="display:none;">
            <div class="title">🔮 תחזית וביוץ</div>
            <div id="prediction" class="grid"></div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button id="prevMonth" style="border:0; background:0; font-size:20px;">◀️</button>
                <strong id="monthTitle"></strong>
                <button id="nextMonth" style="border:0; background:0; font-size:20px;">▶️</button>
            </div>
            <div id="calendar" class="calendar"></div>
        </div>

        <!-- כרטיס ניהול והגדרות חדש -->
        <div class="card">
            <div class="title">⚙️ ניהול והגדרות</div>
            <button onclick="exportData()" class="secondary-btn">📊 הורדת דוח לרופא (PDF/TXT)</button>
            <button onclick="toggleAppMode()" class="secondary-btn" style="background:#fff1f7">🔄 החלפת מצב (רגיל / תכנון היריון)</button>
        </div>

        <div class="card">
            <div class="title" onclick="toggleHistory()">
                <span>📖 היסטוריה</span>
                <span id="historyArrow" class="toggle-arrow">▼</span>
            </div>
            <div id="historyContent">
                <div id="list"></div>
            </div>
        </div>
    </div>

    <footer>
        <p>© כל הזכויות שמורות לאור שקפאתי</p>
        <p>גרסת עדכון: 1.7.3v</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, getDocs, deleteDoc, doc, setDoc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC3GgMwsc-30RoK7bKiCdaw8P6kZz-hLfg",
            authDomain: "perioday1.firebaseapp.com",
            projectId: "perioday1",
            storageBucket: "perioday1.firebasestorage.app",
            messagingSenderId: "926275939384",
            appId: "1:926275939384:web:7a40c16c0254bbc6038acd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        let userMode = 'regular';
        let viewDate = new Date();
        let globalData = [];

        window.toggleHistory = () => {
            const content = document.getElementById('historyContent');
            const arrow = document.getElementById('historyArrow');
            if (content.style.display === 'block') {
                content.style.display = 'none';
                arrow.classList.remove('open');
            } else {
                content.style.display = 'block';
                arrow.classList.add('open');
            }
        };

        function getGreeting() {
            const hour = new Date().getHours();
            if (hour < 12 && hour > 4) return "בוקר טוב";
            if (hour < 17) return "צהריים טובים";
            if (hour < 21) return "ערב טוב";
            return "לילה טוב";
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userSnap = await getDoc(doc(db, "users_metadata", user.uid));
                if (userSnap.exists()) {
                    userMode = userSnap.data().mode || 'regular';
                    showApp(userSnap.data().name);
                } else {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('setupScreen').style.display = 'flex';
                }
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
            }
        });

        document.getElementById('saveNameBtn').onclick = async () => {
            const name = document.getElementById('customName').value;
            const mode = document.getElementById('initialMode').value;
            if (!name) return alert("אנא הכניסי שם");
            userMode = mode;
            await setDoc(doc(db, "users_metadata", currentUser.uid), { name, mode });
            showApp(name);
        };

        window.toggleAppMode = async () => {
            userMode = userMode === 'regular' ? 'conception' : 'regular';
            await updateDoc(doc(db, "users_metadata", currentUser.uid), { mode: userMode });
            location.reload();
        };

        function showApp(name) {
            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('greeting').innerText = `${getGreeting()}, ${name} 🌸`;
            document.getElementById('modeDisplay').innerText = `מצב: ${userMode === 'regular' ? 'מעקב רגיל' : 'תכנון היריון'}`;
            loadData();
        }

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        document.getElementById('saveBtn').onclick = async () => {
            const date = document.getElementById("date").value;
            const duration = parseInt(document.getElementById("duration").value);
            if (!date || !currentUser) return;
            await addDoc(collection(db, "users", currentUser.uid, "entries"), {
                date, duration, notes: document.getElementById("notes").value, timestamp: serverTimestamp()
            });
            loadData();
            alert("נשמר! ✨");
        };

        async function loadData() {
            if (!currentUser) return;
            const q = query(collection(db, "users", currentUser.uid, "entries"), orderBy("date", "desc"));
            const querySnapshot = await getDocs(q);
            globalData = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            render(globalData);
        }

        function render(data) {
            let nextPeriod = null; let ovulationDate = null;
            if (data.length >= 2) {
                document.getElementById("predCard").style.display = "block";
                let gaps = [];
                for (let i = 0; i < data.length - 1; i++) {
                    let diff = Math.round((new Date(data[i].date) - new Date(data[i+1].date)) / 86400000);
                    if (diff > 20 && diff < 45) gaps.push(diff);
                }
                const avgCycle = gaps.length ? Math.round(gaps.reduce((a,b)=>a+b)/gaps.length) : 28;
                nextPeriod = new Date(data[0].date);
                nextPeriod.setDate(nextPeriod.getDate() + avgCycle);
                ovulationDate = new Date(nextPeriod); ovulationDate.setDate(ovulationDate.getDate() - 14);

                document.getElementById("prediction").innerHTML = `
                    <div class="box"><strong>מחזור הבא</strong><span>${nextPeriod.toLocaleDateString('he-IL')}</span></div>
                    <div class="box"><strong>ביוץ משוער</strong><span>${ovulationDate.toLocaleDateString('he-IL')}</span></div>
                `;
            } else { document.getElementById("predCard").style.display = "none"; }

            renderCalendar(data, nextPeriod, ovulationDate);
            const list = document.getElementById("list");
            list.innerHTML = "";
            data.forEach(e => {
                const div = document.createElement('div');
                div.className = 'entry';
                div.innerHTML = `<button class="delete-btn">🗑️</button><strong>${new Date(e.date).toLocaleDateString('he-IL')}</strong><br><small>נמשך ${e.duration} ימים. ${e.notes || ''}</small>`;
                div.querySelector('.delete-btn').onclick = async () => { if(confirm("למחוק?")) { await deleteDoc(doc(db, "users", currentUser.uid, "entries", e.id)); loadData(); } };
                list.appendChild(div);
            });
        }

        function renderCalendar(data, nextPeriod, ovulationDate) {
            const cal = document.getElementById("calendar"); cal.innerHTML = "";
            const year = viewDate.getFullYear(); const month = viewDate.getMonth();
            document.getElementById("monthTitle").innerText = viewDate.toLocaleDateString('he-IL', { month: 'long', year: 'numeric' });
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) cal.innerHTML += `<div></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const curr = new Date(year, month, d);
                let cls = (new Date().toDateString() === curr.toDateString()) ? "today" : "";
                data.forEach(e => {
                    const start = new Date(e.date); const end = new Date(start); end.setDate(end.getDate() + e.duration - 1);
                    if (curr >= start && curr <= end) cls += " period";
                });
                if (ovulationDate && curr.toDateString() === ovulationDate.toDateString()) cls += " ovulation";
                cal.innerHTML += `<div class="day ${cls}">${d}</div>`;
            }
        }

        window.exportData = () => {
            let text = "דוח מחזור אישי - Perioday\n\n";
            globalData.forEach(e => { text += `תאריך: ${e.date} | משך: ${e.duration} ימים\n`; });
            const blob = new Blob([text], { type: "text/plain" });
            const anchor = document.createElement("a");
            anchor.download = "period_report.txt"; anchor.href = window.URL.createObjectURL(blob); anchor.click();
        };

        document.getElementById("prevMonth").onclick = () => { viewDate.setMonth(viewDate.getMonth() - 1); loadData(); };
        document.getElementById("nextMonth").onclick = () => { viewDate.setMonth(viewDate.getMonth() + 1); loadData(); };
    </script>
</body>
</html>
